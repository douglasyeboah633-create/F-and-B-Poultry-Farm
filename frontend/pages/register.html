<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - F and B Poultry Farm</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-control {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #888;
            padding: 5px;
        }
        .toggle-password:hover {
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
<a href="/" class="nav-logo">F and B Poultry Farm</a>
<button class="menu-toggle" onclick="toggleMenu()">Menu</button>
            <ul class="nav-links" id="nav-links"></ul>
        </div>
    </nav>

    <div class="form-container">
<h2 style="text-align:center;color:#2e7d32;margin-bottom:30px;">Create Your Account</h2>
        
        <div id="error-message" class="alert alert-error hidden"></div>
        <div id="success-message" class="alert alert-success hidden"></div>
        
        <form id="register-form">
            <div class="form-group">
                <label for="username">Full Name</label>
                <input type="text" id="username" class="form-control" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" class="form-control" placeholder="Enter your phone number">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Create a password (min 6 chars)" required minlength="6">
<button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)" title="Show/Hide password">Show/Hide</button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your password" required>
<button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirm-password', this)" title="Show/Hide password">Show/Hide</button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>
        
        <p style="text-align:center;margin-top:20px;">
            Already have an account? <a href="/pages/login.html">Login here</a>
        </p>
    </div>

    <!-- Verification Modal -->
    <div class="modal-overlay" id="verify-modal">
        <div class="modal">
            <h2 class="modal-title">Verify Your Account</h2>
            <p style="color:#666;margin-bottom:20px;">Enter the verification code sent to your email/phone</p>
            <form id="verify-form">
                <input type="hidden" id="verify-user-id">
                <div class="form-group">
                    <label for="verification-code">Verification Code</label>
                    <input type="text" id="verification-code" class="form-control" placeholder="Enter 6-digit code" maxlength="6" required>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Verify Account</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
<p>F and B Poultry Farm Limited &copy; 2024</p>
        <p style="font-weight: 600; color: #333333; margin-top: 10px;">
            📍 Berekum-Abi | 📞 054411993 | 📧 info@fandbpoultry.com
        </p>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        // Toggle password visibility
        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
button.textContent = 'Hide'; // Hide icon
            } else {
                input.type = 'password';
button.textContent = 'Show'; // Show icon
            }
        }

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match!';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters!';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            try {
                const result = await registerUser(username, email, password, phone);
                
                // Verification modal will be shown by the registerUser function
                // Don't redirect yet, wait for verification
                
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        });

        // Verification form submission
        document.getElementById('verify-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userId = document.getElementById('verify-user-id').value;
            const code = document.getElementById('verification-code').value;
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            try {
                const result = await verifyAccount(userId, code);
                
                successDiv.textContent = 'Account verified successfully! Redirecting to login...';
                successDiv.classList.remove('hidden');
                
                // Close modal after 2 seconds and redirect
                setTimeout(() => {
                    document.getElementById('verify-modal').classList.remove('active');
                    window.location.href = '/pages/login.html';
                }, 2000);
                
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
