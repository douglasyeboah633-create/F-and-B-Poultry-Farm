<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - F and B Poultry Farm</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">F and B Poultry Farm</a>
            <button class="menu-toggle" onclick="toggleMenu()">Menu</button>
            <ul class="nav-links" id="nav-links"></ul>
        </div>
    </nav>
    <div class="container">
        <h1 style="color:#2e7d32;">My Orders</h1>
        <p style="color:#888;margin-bottom:30px;">View your current orders and make payments</p>
        <div id="my-orders" class="table-container"></div>
    </div>
<footer class="footer">
<p>F and B Poultry Farm Limited &copy; 2024</p>
        <p style="font-weight: 600; color: #ffffff; margin-top: 10px;">
            📍 Berekum-Abi | 📞 054411993 | 📧 info@fandbpoultry.com
        </p>
    </footer>
    <script src="/js/main.js"></script>
    <script>
        if (!isLoggedIn()) window.location.href = '/pages/login.html';
        async function loadMyOrders() {
            const container = document.getElementById('my-orders');
            try {
                const orders = await apiCall('/orders');
                if (orders.length === 0) {
                    container.innerHTML = '<p style="text-align:center;color:#888;">You haven\'t placed any orders yet</p><p style="text-align:center;margin-top:20px;"><a href="/pages/products.html" class="btn btn-primary">Browse Products</a></p>';
                    return;
                }
                let html = `<table><thead><tr><th>Order ID</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Payment</th></tr></thead><tbody>`;
                orders.forEach(order => {
                    const statusClass = `status-${order.status}`;
                    const itemsList = order.items ? order.items.map(i => `${i.product_name} x${i.quantity}`).join(', ') : 'N/A';
                    const isPaid = order.payment && order.payment.payment_status === 'completed';
                    html += `<tr>
                        <td>#${order.id}</td>
                        <td><small>${itemsList}</small></td>
                        <td><strong>GHS ${order.total_amount.toFixed(2)}</strong></td>
                        <td class="${statusClass}">${order.status}</td>
                        <td>${new Date(order.order_date).toLocaleDateString()}</td>
<td>${isPaid ? '<span style="color:#2e7d32;font-weight:600;">Paid</span>' : `<button onclick="payForOrder(${order.id}, ${order.total_amount})" class="btn btn-primary btn-small">Pay Now</button>`}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) { container.innerHTML = '<p style="color:#d32f2f;">Error loading orders</p>'; }
        }
        async function payForOrder(orderId, amount) {
            if (!confirm(`Pay GHS ${amount.toFixed(2)} for Order #${orderId}?`)) return;
            try {
                // Initialize Paystack payment
                const paymentInit = await initializePaystackPayment(orderId);
                
                if (paymentInit.status) {
                    // Redirect to Paystack payment page
                    window.location.href = paymentInit.data.authorization_url;
                } else {
                    alert('Failed to initialize payment: ' + paymentInit.message);
                }
            } catch (error) { alert('Payment failed: ' + error.message); }
        }
        document.addEventListener('DOMContentLoaded', loadMyOrders);
    </script>
</body>
</html>
