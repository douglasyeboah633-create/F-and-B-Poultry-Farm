<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - F and B Poultry Farm</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
<a href="/" class="nav-logo">F and B Poultry Farm</a>
<button class="menu-toggle" onclick="toggleMenu()">Menu</button>
            <ul class="nav-links" id="nav-links"></ul>
        </div>
    </nav>

    <div class="container">
        <div class="flex-between">
<h1 style="color:#2e7d32;">Manage Products</h1>
            <button onclick="showAddProductModal()" class="btn btn-primary">+ Add Product</button>
        </div>
        <p style="color:#888;margin-bottom:30px;">Add, edit, or remove products from your farm</p>
        <div id="products-table" class="table-container"></div>
    </div>

    <div class="modal-overlay" id="product-modal">
        <div class="modal">
            <h2 class="modal-title" id="modal-title">Add Product</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" class="form-control" required>
                        <option value="">Select category</option>
<option value="eggs">Eggs</option>
<option value="chickens">Chickens</option>
<option value="feeds">Feeds</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="price">Price (GHS )</label>
                    <input type="number" id="price" class="form-control" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="stock_quantity">Stock Quantity</label>
                    <input type="number" id="stock_quantity" class="form-control" min="0" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" class="form-control"></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
<p>F and B Poultry Farm Limited &copy; 2024</p>
        <p style="font-weight: 600; color: #ffffff; margin-top: 10px;">
            📍 Berekum-Abi | 📞 054411993 | 📧 info@fandbpoultry.com
        </p>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        if (!isLoggedIn() || !isAdmin()) window.location.href = '/pages/login.html';
        async function loadProducts() {
            const container = document.getElementById('products-table');
            try {
                const products = await apiCall('/products');
                let html = `<table><thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr></thead><tbody>`;
                products.forEach(p => {
                    html += `<tr>
                        <td>#${p.id}</td>
                        <td><strong>${p.name}</strong></td>
                        <td><span class="badge">${p.category}</span></td>
                        <td>GHS ${p.price.toFixed(2)}</td>
                        <td>${p.stock_quantity}</td>
                        <td>
                            <button onclick="editProduct(${p.id})" class="btn btn-primary btn-small">Edit</button>
                            <button onclick="deleteProduct(${p.id})" class="btn btn-danger btn-small">Delete</button>
                        </td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = '<p style="color:#d32f2f;">Error loading products</p>';
            }
        }
        function showAddProductModal() {
            document.getElementById('modal-title').textContent = 'Add New Product';
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('product-modal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('product-modal').classList.remove('active');
        }
        async function editProduct(id) {
            try {
                const product = await apiCall(`/products/${id}`);
                document.getElementById('modal-title').textContent = 'Edit Product';
                document.getElementById('product-id').value = product.id;
                document.getElementById('name').value = product.name;
                document.getElementById('category').value = product.category;
                document.getElementById('price').value = product.price;
                document.getElementById('stock_quantity').value = product.stock_quantity;
                document.getElementById('description').value = product.description || '';
                document.getElementById('product-modal').classList.add('active');
            } catch (error) { alert('Error loading product'); }
        }
        document.getElementById('product-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('product-id').value;
            const data = {
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                stock_quantity: parseInt(document.getElementById('stock_quantity').value),
                description: document.getElementById('description').value
            };
            try {
                if (id) { await apiCall(`/products/${id}`, 'PUT', data); alert('Product updated!'); }
                else { await apiCall('/products', 'POST', data); alert('Product added!'); }
                closeModal();
                loadProducts();
            } catch (error) { alert('Error: ' + error.message); }
        });
        async function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            try { await apiCall(`/products/${id}`, 'DELETE'); alert('Product deleted!'); loadProducts(); }
            catch (error) { alert('Error: ' + error.message); }
        }
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
